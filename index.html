document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

om: 1px solid #EFEFE8; font-size: 16px; line-height: 1.55;\"><strong style=\"font-weight: 600;\">Geen uurtje-factuurtje.<\u002Fstrong> <span style=\"color: #55594C;\">Heldere abonnementen met een vast bedrag per maand.<\u002Fspan><\u002Fdiv>\n            <div style=\"padding: 18px 0; font-size: 16px; line-height: 1.55;\"><strong style=\"font-weight: 600;\">Flexibel wanneer nodig.<\u002Fstrong> <span style=\"color: #55594C;\">Aanpassen, pauzeren of uitbreiden via Mijn Egberts.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== WERKWIJZE ===== -->\n      <section id=\"werkwijze\" data-screen-label=\"Werkwijze\" style=\"background: #F7F7F2; border-top: 1px solid #EFEFE8; border-bottom: 1px solid #EFEFE8; padding: clamp(56px, 8vw, 96px) clamp(16px, 4vw, 32px);\">\n        <div style=\"max-width: 1180px; margin: 0 auto;\">\n          <h2 style=\"font-family: 'Schibsted Grotesk', sans-serif; font-size: clamp(28px, 4vw, 38px); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 clamp(32px, 5vw, 48px);\">Zo werkt het.<\u002Fh2>\n          <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px;\">\n            <sc-for list=\"{{ werkwijze }}\" as=\"w\" hint-placeholder-count=\"5\">\n              <div style=\"background: #FFFFFF; border: 1px solid #E7E7DC; border-radius: 18px; padding: 24px 22px;\">\n                <div style=\"font-family: 'Schibsted Grotesk', sans-serif; font-size: 14px; font-weight: 800; color: #3F6212; background: #EAF7C0; width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; margin-bottom: 16px;\">{{ w.n }}<\u002Fdiv>\n                <div style=\"font-size: 15.5px; font-weight: 600; margin-bottom: 6px;\">{{ w.t }}<\u002Fdiv>\n                <div style=\"font-size: 13.5px; color: #7C8070; line-height: 1.5;\">{{ w.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u0 flex-wrap: wrap;\">\n                <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #96997F;\">Extra's<\u002Fdiv>\n                <div style=\"display: flex; gap: 6px; background: #F4F4EC; border-radius: 999px; padding: 4px;\">\n                  <button sc-camel-on-click=\"{{ setEenmalig }}\" style=\"{{ eenmaligTabStyle }}\">Eenmalig<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ setPeriodiek }}\" style=\"{{ periodiekTabStyle }}\">Vast in contract<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size: 13.5px; color: #7C8070; margin: 0 0 16px;\">{{ extraUitleg }}<\u002Fp>\n              <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;\">\n                <sc-for list=\"{{ extraCards }}\" as=\"ex\" hint-placeholder-count=\"6\">\n                  <button sc-camel-on-click=\"{{ ex.onClick }}\" style=\"{{ ex.style }}\">\n                    <span style=\"display: flex; justify-content: space-between; align-items: center; gap: 8px;\">\n                      <span style=\"font-size: 14.5px; font-weight: 600; color: #1A1D16;\">{{ ex.t }}<\u002Fspan>\n                      <span style=\"{{ ex.checkStyle }}\">✓<\u002Fspan>\n                    <\u002Fspan>\n                    <span style=\"display: block; font-size: 12.5px; color: #96997F; margin-top: 3px;\">{{ ex.d }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-if value=\"{{ extraCta }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ confirmExtras }}\" style=\"margin-top: 16px; font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 600; color: #FDFDF8; background: #1A1D16; border: none; border-radius: 999px; padding: 11px 22px; cursor: pointer;\" style-hover=\"background: #2A2E22;\">{{ extraCta }}<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- Linnenservice -->\n            <div style=\"background: linear-gradient(135deg, #FFFFFF 0%, #F8FBEA 100%); border: 1px solid #DDE8B8; border-radius: 20px; padding: clamp(20px, 4vw, 28px);\">\n              <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 6px;\">\n                <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #96997F;\">Linnenservice<\u002Fdiv>\n                <span style=\"font-size: 11px; font-weight: 700; color: #3F6212; background: #EAF7C0; border-radius: 999px; padding: 4px 10px;\">Nieuw<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size: 14px; color: #55594C; line-height: 1.55; margin: 0 0 16px; max-width: 60ch;\">Wij nemen uw was mee tijdens de beurt en brengen het schoon en gevouwen terug bij de volgende. Beddengoed, handdoeken en kleding — gewassen volgens dezelfde vaste standaard.<\u002Fp>\n              <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;\">\n                <sc-for list=\"{{ linnenCards }}\" as=\"ln\" hint-placeholder-count=\"3\">\n                  <button sc-camel-on-click=\"{{ ln.onClick }}\" style=\"{{ ln.style }}\">\n                    <span style=\"display: flex; justify-content: space-between; align-items: center; gap: 8px;\">\n                      <span style=\"font-size: 14.5px; font-weight: 600; color: #1A1D16;\">{{ ln.t }}<\u002Fspan>\n                      <span style=\"{{ ln.checkStyle }}\">✓<\u002Fspan>\n                    <\u002Fspan>\n                    <span style=\"display: block; font-size: 12.5px; color: #96997F; margin-top: 3px;\">{{ ln.d }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Vakantie -->\n            <div style=\"background: #FFFFFF; border: 1px solid #E7E7DC; border-radius: 20px; padding: clamp(20px, 4vw, 28px);\">\n              <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #96997F; margin-bottom: 6px;\">Vakantie doorgeven<\u002Fdiv>\n              <p style=\"font-size: 13.5px; color: #7C8070; margin: 0 0 16px;\">Wij slaan de beurten in deze periode over. Conform uw contract vervalt de betaling voor overgeslagen beurten vanaf twee weken afwezigheid.<\u002Fp>\n              <div style=\"display: flex; gap: 10px; flex-wrap: wrap; align-items: center;\">\n                <input type=\"date\" value=\"{{ vakVan }}\" sc-camel-on-change=\"{{ setVakVan }}\" style=\"font-family: 'Instrument Sans', sans-serif; font-size: 14px; padding: 11px 14px; border: 1px solid #E0E0D5; border-radius: 12px; outline: none; background: #FDFDF8; color: #1A1D16;\" style-focus=\"border-color: #1A1D16;\">\n                <span style=\"font-size: 13.5px; color: #96997F;\">tot<\u002Fspan>\n                <input type=\"date\" value=\"{{ vakTot }}\" sc-camel-on-change=\"{{ setVakTot }}\" style=\"font-family: 'Instrument Sans', sans-serif; font-size: 14px; padding: 11px 14px; border: 1px solid #E0E0D5; border-radius: 12px; outline: none; background: #FDFDF8; color: #1A1D16;\" style-focus=\"border-color: #1A1D16;\">\n                <button sc-camel-on-click=\"{{ submitVakantie }}\" style=\"font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 600; color: #1A1D16; background: #F4F4EC; border: none; border-radius: 999px; padding: 11px 20px; cursor: pointer;\" style-hover=\"background: #ECECE0;\">Doorgeven<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Klacht of opmerking -->\n            <div style=\"background: #FFFFFF; border: 1px solid #E7E7DC; border-radius: 20px; padding: clamp(20px, 4vw, 28px);\">\n              <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #96997F; margin-bottom: 6px;\">Klacht of opmerking<\u002Fdiv>\n              <p style=\"font-size: 13.5px; color: #7C8070; margin: 0 0 14px;\">Niet tevreden over een beurt? Wij herstellen het binnen twee werkdagen, zonder extra kosten. Zo staat het in uw contract.<\u002Fp>\n              <textarea value=\"{{ klachtTekst }}\" sc-camel-on-change=\"{{ setKlacht }}\" placeholder=\"Beschrijf kort wat er niet goed was…\" rows=\"3\" style=\"font-family: 'Instrument Sans', sans-serif; font-size: 14.5px; padding: 13px 15px; border: 1px solid #E0E0D5; border-radius: 12px; outline: none; background: #FDFDF8; width: 100%; box-sizing: border-box; resize: vertical;\" style-focus=\"border-color: #1A1D16;\"><\u002Ftextarea>\n              <button sc-camel-on-click=\"{{ submitKlacht }}\" style=\"margin-top: 12px; font-family: 'Instrument Sans', sans-serif; font-size: 14px; font-weight: 600; color: #1A1D16; background: #F4F4EC; border: none; border-radius: 999px; padding: 11px 22px; cursor: pointer;\" style-hover=\"background: #ECECE0;\">Versturen<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- Overige acties -->\n            <div style=\"background: #FFFFFF; border: 1px solid #E7E7DC; border-radius: 20px; padding: clamp(20px, 4vw, 28px);\">\n              <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #96997F; margin-bottom: 16px;\">Regel het zelf<\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;\">\n                <sc-for list=\"{{ portalActions }}\" as=\"pa\" hint-placeholder-count=\"4\">\n                  <button sc-camel-on-click=\"{{ pa.onClick }}\" style=\"font-family: 'Instrument Sans', sans-serif; text-align: left; background: #FDFDF8; border: 1px solid #E7E7DC; border-radius: 14px; padding: 15px 16px; cursor: pointer; transition: border-color .15s;\" style-hover=\"border-color: #1A1D16;\">\n  een offerte op maat.'\n        : 'Prijsindicatie — wij komen langs voor een persoonlijke kennismaking en maken dan samen uw definitieve offerte.',\n      kortingNote: c.pay.mult < 1\n        ? 'Inclusief ' + Math.round((1 - c.pay.mult) * 100) + '% korting (' + c.pay.title.toLowerCase() + ').'\n        : 'Tip: ' + (s.segment === 'particulier' ? 'jaarbetaling' : 'een meerjarig contract') + ' geeft ' + d.korting + '% korting.',\n      flexNote: s.segment === 'particulier' ? 'Maandelijks aanpasbaar en opzegbaar.' : 'Alle prijzen excl. btw · uitbreidingen altijd aanpasbaar.',\n\n      ovzType: c.t.title + ' · ' + c.size.title,\n      ovzPakket: c.pkg.title,\n      ovzFreq: c.freq.title + ' · ' + c.pay.title.toLowerCase(),\n\n      // Portaal\n      portalNote: s.portalNote,\n      clearNote: () => this.setState({ portalNote: '' }),\n      toggleSkip: () => this.setState(st => ({ skipped: !st.skipped, portalNote: st.skipped ? 'Beurt hersteld.' : 'Beurt overgeslagen. De eerstvolgende beurt is ' + (user ? user.afspraakNext : '') + '.' })),\n      skipLabel: s.skipped ? 'Beurt herstellen' : 'Beurt overslaan',\n      afspraakDeco: s.skipped ? 'line-through' : 'none',\n      afspraakSub: s.skipped ? 'Overgeslagen · volgende: ' + (user ? user.afspraakNext : '') : (user ? user.afspraakSub : ''),\n      afspraakBadge: s.skipped ? 'Overgeslagen' : 'Bevestigd',\n      afspraakBadgeStyle: 'font-size:12px;font-weight:700;border-radius:999px;padding:6px 13px;white-space:nowrap;' +\n        (s.skipped ? 'background:#F4F4EC;color:#7C8070;' : 'background:#EAF7C0;color:#3F6212;'),\n      bookExtra: () => this.setState({ portalNote: 'Extra schoonmaak aangevraagd. Wij bevestigen de datum per e-mail.' }),\n      portalActions, invoices, ratings,\n\n      // Extra's\n      extraCards, linnenCards,\n      setEenmalig: () => this.setState({ extraMode: 'eenmalig' }),\n      setPeriodiek: () => this.setState({ extraMode: 'periodiek' }),\n      eenmaligTabStyle: extraTabBase + (s.extraMode === 'eenmalig' ? 'background:#1A1D16;color:#FDFDF8;' : 'background:transparent;color:#55594C;'),\n      periodiekTabStyle: extraTabBase + (s.extraMode === 'periodiek' ? 'background:#1A1D16;color:#FDFDF8;' : 'background:transparent;color:#55594C;'),\n      extraUitleg: s.extraMode === 'eenmalig'\n        ? 'Eenmalig bijboeken. Wij plannen het in bij een volgende beurt.'\n        : 'Vast toevoegen aan uw contract. Maandelijks weer aanpasbaar.',\n      extraCta: extraCount > 0\n        ? (s.extraMode === 'eenmalig' ? 'Boek ' + extraCount + ' extra' + (extraCount > 1 ? '\\u2019s' : '') + ' eenmalig' : 'Voeg ' + extraCount + ' extra' + (extraCount > 1 ? '\\u2019s' : '') + ' toe aan contract')\n        : false,\n      confirmExtras: () => this.setState({\n        extraSel: {},\n        portalNote: s.extraMode === 'eenmalig'\n          ? 'Aanvraag ontvangen. Wij plannen uw extra\\u2019s in bij een volgende beurt en bevestigen per e-mail.'\n          : 'Contractwijziging ontvangen. De extra\\u2019s gaan in per de eerstvolgende maand; u ontvangt een bevestiging.'\n      }),\n\n      // Vakantie\n      vakVan: s.vakVan, vakTot: s.vakTot,\n      setVakVan: (e) => this.setState({ vakVan: e.target.value }),\n      setVakTot: (e) => this.setState({ vakTot: e.target.value }),\n      submitVakantie: () => this.setState({\n        portalNote: (s.vakVan && s.vakTot)\n          ? 'Vakantie doorgegeven (' + s.vakVan + ' t/m ' + s.vakTot + '). Wij slaan de beurten in deze periode over.'\n          : 'Kies eerst een begin- en einddatum.'\n      }),\n\n      // Klacht\n      klachtTekst: s.klachtTekst,\n      setKlacht: (e) => this.setState({ klachtTekst: e.target.value }),\n      submitKlacht: () => this.setState({\n        klachtTekst: '',\n        portalNote: s.klachtTekst\n          ? 'Klacht ontvangen. Wij nemen binnen één werkdag contact op en herstellen het binnen twee werkdagen.'\n          : 'Beschrijf eerst kort uw klacht of opmerking.'\n      })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
